name: OpenFlow
options:
  bundleIdPrefix: com.openflow
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  defaultConfig: Debug

packages:
  SwiftWhisper:
    url: https://github.com/exPHAT/SwiftWhisper
    from: "1.2.0"
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.24.0"

targets:
  OpenFlow:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: OpenFlow
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openflow.app
        PRODUCT_NAME: OpenFlow
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: OpenFlow/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenFlow/Resources/Whisper.entitlements
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: "-"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - package: SwiftWhisper
      - package: HotKey
      - package: GRDB
        product: GRDB
